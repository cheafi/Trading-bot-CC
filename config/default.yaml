# ============================================================================
# CC — Default Configuration
# ============================================================================
# Override per-environment by setting env vars or using config/<env>.yaml
# See docs/SETUP_GUIDE.md for full configuration reference.
# ============================================================================

app:
  name: "CC"
  version: "6.0.0"
  env: "development"           # development | staging | production
  log_level: "INFO"

# ---------------------------------------------------------------------------
# Notifications — Discord is the primary interface
# ---------------------------------------------------------------------------
notifications:
  primary: discord
  discord:
    enabled: true
    prefix: "!"
    sync_commands_on_start: true
    embed_color: 0x5865F2       # Discord blurple
    # Channel IDs are set via environment variables (DISCORD_ALERT_CHANNEL_ID, etc.)
    alert_severity_tiers:
      urgent: "🔴"              # Immediate action needed (circuit breaker, tail risk)
      important: "🟡"           # Actionable signal (new setup, stop hit)
      informational: "🔵"       # Context update (regime shift, news digest)
    deduplication:
      enabled: true
      cooldown_seconds: 300     # Suppress duplicate alerts within 5 min
    bilingual:
      enabled: false            # Set true for English + Traditional Chinese
      languages: ["en", "zh-TW"]

# ---------------------------------------------------------------------------
# Market Data
# ---------------------------------------------------------------------------
market_data:
  source: "yfinance"            # yfinance | alpaca | polygon
  cache_ttl_seconds: 60
  universes:
    us_equities: true           # S&P 500/400, NASDAQ-100, Russell 2000
    hk_equities: true           # HSI + H-shares + tech
    jp_equities: true           # TOPIX / Nikkei 225
    crypto: true                # BTC, ETH, SOL + DeFi
    macro_indices: true         # VIX, DXY, yields, gold, oil
  rate_limit:
    max_concurrent: 5
    delay_between_ms: 200

# ---------------------------------------------------------------------------
# Regime Detection
# ---------------------------------------------------------------------------
regime:
  enabled: true
  states:
    - bull_trending
    - bull_volatile
    - bull_exhaustion
    - neutral_consolidation
    - sideways
    - bear_rally
    - bear_trending
    - bear_volatile
    - crisis
  update_interval_minutes: 15
  # Signal throttling: reduce alert volume in hostile regimes
  throttle:
    bear_volatile: 0.5          # Emit 50% of normal signal volume
    crisis: 0.25                # Emit 25% of normal signal volume

# ---------------------------------------------------------------------------
# Signal Engine
# ---------------------------------------------------------------------------
signals:
  strategies:
    swing:
      enabled: true
      min_score: 55
      holding_period: "3d-15d"
    breakout:
      enabled: true
      min_score: 60
      volume_confirm: true
    momentum:
      enabled: true
      min_score: 55
    mean_reversion:
      enabled: true
      min_score: 60
      # Only active in sideways/consolidation regimes by default
      regime_filter: ["sideways", "neutral_consolidation"]

  # Score thresholds for alert tiers
  scoring:
    strong_buy: 80              # Score >= 80 → strong conviction
    buy: 65                     # Score >= 65 → standard signal
    watch: 50                   # Score >= 50 → watchlist only
    # Scores below 50 are not alerted

  # Invalidation: always show stop/invalidation on alerts
  invalidation:
    require_stop: true          # Every signal must have a stop price
    require_why_not: true       # Every signal must explain risk/contradiction

# ---------------------------------------------------------------------------
# Risk Controls
# ---------------------------------------------------------------------------
risk:
  max_portfolio_heat: 0.06      # Max 6% total portfolio risk
  max_single_position: 0.02     # Max 2% risk per position
  max_correlated_exposure: 0.10 # Max 10% in highly correlated names
  circuit_breaker:
    daily_loss_limit: 0.03      # Pause trading after 3% daily drawdown
    weekly_loss_limit: 0.05     # Pause trading after 5% weekly drawdown
    enabled: true

# ---------------------------------------------------------------------------
# Broker
# ---------------------------------------------------------------------------
broker:
  default: "paper"              # paper | alpaca | futu | ibkr | mt5
  paper:
    initial_capital: 100000
    commission_per_trade: 0.0
  # Broker-specific settings come from environment variables.
  # See .env.example for required keys per broker.

# ---------------------------------------------------------------------------
# Scheduler (background tasks)
# ---------------------------------------------------------------------------
scheduler:
  enabled: true
  tasks:
    morning_scan:
      cron: "0 9 * * 1-5"      # Weekdays 9:00 AM
      timezone: "US/Eastern"
    regime_update:
      cron: "*/15 9-16 * * 1-5" # Every 15 min during market hours
      timezone: "US/Eastern"
    daily_brief:
      cron: "0 18 * * 1-5"     # Weekdays 6:00 PM
      timezone: "US/Eastern"
    health_check:
      cron: "*/5 * * * *"      # Every 5 minutes

# ---------------------------------------------------------------------------
# AI / LLM
# ---------------------------------------------------------------------------
llm:
  provider: "openai"            # openai | azure_openai | none
  model: "gpt-4o-mini"
  max_tokens: 1024
  temperature: 0.3              # Low temp for consistent analysis
  # Used for: signal narratives, news summarization, regime commentary
  # NOT used for: trade execution decisions (those are rule-based)

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  pool_size: 5
  max_overflow: 10
  echo: false                   # Set true for SQL debug logging

# ---------------------------------------------------------------------------
# Performance Tracking
# ---------------------------------------------------------------------------
performance:
  track_all_signals: true       # Log every signal for post-trade review
  equity_curve: true
  sharpe_window_days: 60
  benchmark: "SPY"
