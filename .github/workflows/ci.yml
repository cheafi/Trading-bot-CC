name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install black ruff

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            -c /dev/null \
            --ignore=tests/__pycache__
        env:
          APP_ENV: test
          BROKER: paper

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Check for secrets in code
        run: |
          # Fail if any obvious secret patterns found in tracked files
          if git grep -lP '(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36})' -- '*.py' '*.yaml' '*.yml' '*.json' '*.md'; then
            echo "::error::Potential secrets detected in source files!"
            exit 1
          fi
          echo "No obvious secrets found."

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt --ignore-vuln GHSA-0000-0000-0000 || true
