name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: development
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: tradingai
      POSTGRES_USER: tradingai
      POSTGRES_PASSWORD: ""
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      API_SECRET_KEY: ci-secret-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/api.txt -r requirements/engine.txt

      - name: Import API app
        run: python -c "from src.api.main import app; print(app.title)"

      - name: Run signal regression tests
        run: python -m unittest tests.test_sprint2_fixes.TestRegimeWeights

      - name: Run forced-condition pipeline
        run: python test_signal_with_forced_conditions.py

      - name: Run system smoke test
        run: python test_system.py

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t tradingai-api-ci .

      - name: Smoke test API container
        run: |
          docker run -d --name tradingai-api-ci-smoke \
            -p 10002:8000 \
            -e PORT=8000 \
            -e UVICORN_RELOAD=false \
            tradingai-api-ci
          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:10002/health/live"
          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      payload = json.loads(response.read().decode())
                  if payload.get("status") == "alive":
                      print(payload)
                      break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"container health check failed: {last_error}")
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker logs tradingai-api-ci-smoke || true

      - name: Clean up API container
        if: always()
        run: docker rm -f tradingai-api-ci-smoke || true