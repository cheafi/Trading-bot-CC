name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: development
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: tradingai
      POSTGRES_USER: tradingai
      POSTGRES_PASSWORD: ""
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      API_SECRET_KEY: ci-secret-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/api.txt -r requirements/engine.txt

      - name: Import API app
        run: python -c "from src.api.main import app; print(app.title)"

      - name: Run signal regression tests
        run: python -m unittest tests.test_sprint2_fixes.TestRegimeWeights

      - name: Run forced-condition pipeline
        run: python test_signal_with_forced_conditions.py

      - name: Run system smoke test
        run: python test_system.py