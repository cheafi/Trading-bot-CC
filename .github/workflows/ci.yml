name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" jinja2 yfinance requests aiohttp httpx python-multipart
          pip install pytest pytest-asyncio

      - name: Syntax check
        run: python -m compileall src/ -q

      - name: Import smoke test
        run: |
          python -c "from src.core.config import settings; print('config OK')"
          python -c "from src.api.main import app; print('app import OK')"
        env:
          TRADING_ENV: paper

      - name: Health endpoint smoke test
        run: |
          uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ]
          kill %1 2>/dev/null || true
        env:
          TRADING_ENV: paper

      - name: Sprint tests
        run: |
          python -m pytest test_sprint57.py test_sprint58.py -x -q --tb=short 2>/dev/null || true
        env:
          TRADING_ENV: paper

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Check for secrets in code
        run: |
          # Fail if any obvious secret patterns found in tracked files
          if git grep -lP '(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36})' -- '*.py' '*.yaml' '*.yml' '*.json' '*.md'; then
            echo "::error::Potential secrets detected in source files!"
            exit 1
          fi
          echo "No obvious secrets found."

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt --ignore-vuln GHSA-0000-0000-0000 || true
