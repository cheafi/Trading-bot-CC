name: Daily Brief Pipeline

on:
  schedule:
    # Run at 06:00 AM ET (10:00 UTC during EDT, 11:00 UTC during EST)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Generate brief JSON
        run: python scripts/gen_brief_quick.py

      - name: Verify output
        run: |
          FILE=$(ls -t data/brief-*.json | head -1)
          echo "Generated: $FILE"
          python -c "import json; d=json.load(open('$FILE')); print(f'Actionable: {len(d[\"actionable\"])}, Watch: {len(d[\"watch\"])}, Review: {len(d[\"review\"])}')"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brief-*.json
          git diff --cached --quiet || git commit -m "data: daily brief $(date +%Y-%m-%d)"
          git push
