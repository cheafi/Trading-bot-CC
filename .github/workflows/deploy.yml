name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" jinja2 yfinance requests aiohttp httpx python-multipart

      - name: Smoke test imports
        run: |
          python -c "from src.api.main import app; print('✅ App imports OK')"
        env:
          APP_ENV: test
          BROKER: paper

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s "$RENDER_DEPLOY_HOOK"
            echo "✅ Render deploy triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK not set — skipping auto-deploy"
            echo "Set up at: https://render.com/docs/deploy-hooks"
          fi
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
