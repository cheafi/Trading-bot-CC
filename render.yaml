# Render.com Blueprint — deploy from GitHub
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tradingai-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements/api.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRADING_ENV
        value: paper
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
