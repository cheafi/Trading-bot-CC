<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a8ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  
  <!-- Chart lines -->
  <path d="M30 140 L60 120 L90 130 L120 80 L150 60 L162 70" 
        stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow up -->
  <path d="M150 60 L162 48 L162 70" 
        stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI brain circle -->
  <circle cx="96" cy="96" r="35" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  
  <!-- Dollar sign -->
  <text x="96" y="108" text-anchor="middle" fill="url(#accent)" font-size="40" font-weight="bold" font-family="Arial">$</text>
  
  <!-- Dots for data points -->
  <circle cx="60" cy="120" r="5" fill="#00d4aa"/>
  <circle cx="90" cy="130" r="5" fill="#00d4aa"/>
  <circle cx="120" cy="80" r="5" fill="#00d4aa"/>
  <circle cx="150" cy="60" r="5" fill="#00d4aa"/>
</svg>
